name: Publish Xenia graphs lesson

on:
  push:
    branches:
      - agent/xenia-graphs-20-07-26

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore lesson sources and update index
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip
          parts = sorted(Path('.lesson-build/xenia-graphs-20-07-26').glob('*.part'))
          payload = ''.join(path.read_text(encoding='utf-8') for path in parts)
          code = gzip.decompress(base64.b64decode(payload))
          Path('/tmp/publish_lesson.py').write_bytes(code)
          PY
          python /tmp/publish_lesson.py

      - name: Create educational poster
        run: |
          python -m pip install --quiet pillow
          python /tmp/make_poster.py

      - name: Compile PDF
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq texlive-xetex texlive-lang-cyrillic texlive-latex-extra texlive-pictures fonts-dejavu-core
          mkdir -p students/xenia_klykova/pdf_docs
          xelatex -interaction=nonstopmode -halt-on-error -output-directory=students/xenia_klykova/pdf_docs students/xenia_klykova/tex_docs/20.07.26.tex
          rm -f students/xenia_klykova/pdf_docs/20.07.26.aux students/xenia_klykova/pdf_docs/20.07.26.log students/xenia_klykova/pdf_docs/20.07.26.out

      - name: Validate outputs
        run: |
          test -s students/xenia_klykova/site/20-07-26.html
          test -s students/xenia_klykova/tex_docs/20.07.26.tex
          test -s students/xenia_klykova/pdf_docs/20.07.26.pdf
          test -s students/xenia_klykova/images/20.07.26.png
          grep -q '20-07-26.html' students/xenia_klykova/site/index.html
          grep -q '../images/20.07.26.png' students/xenia_klykova/site/20-07-26.html
          grep -q '../pdf_docs/20.07.26.pdf' students/xenia_klykova/site/20-07-26.html
          grep -q '../tex_docs/20.07.26.tex' students/xenia_klykova/site/20-07-26.html

      - name: Commit generated lesson
        run: |
          rm -rf .lesson-build/xenia-graphs-20-07-26
          rm -f .github/workflows/publish-xenia-graphs-20-07-26.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Добавить материалы по графикам для Ксении за 20.07.26'
          git push origin HEAD:agent/xenia-graphs-20-07-26
