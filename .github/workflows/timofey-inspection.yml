name: Timofey source inspection

on:
  push:
    branches:
      - agent/timofey-21-07-26

permissions:
  contents: write

jobs:
  inspect:
    if: ${{ !contains(github.event.head_commit.message, '[inspection-output]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install recognition tools
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-rus
          python3 -m pip install --quiet pillow
      - name: Prepare readable image sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/timofey-inspection
          mkdir -p .tmp/timofey-inspection
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageOps, ImageEnhance, ImageFilter

          src = Path('students/timofey/table.png')
          out = Path('.tmp/timofey-inspection')
          with Image.open(src) as image:
              original_size = image.size
              rgb = image.convert('RGB')
              preview = rgb.copy()
              preview.thumbnail((1800, 1800), Image.Resampling.LANCZOS)
              preview.save(out / 'preview.jpg', 'JPEG', quality=86, optimize=True, progressive=True)

              gray = ImageOps.grayscale(rgb)
              gray = ImageOps.autocontrast(gray, cutoff=1)
              gray = ImageEnhance.Contrast(gray).enhance(1.8)
              gray = gray.filter(ImageFilter.SHARPEN)
              gray.save('/tmp/table-processed.png')

          (out / 'manifest.txt').write_text(
              f'original_size={original_size[0]}x{original_size[1]}\n'
              f'preview_size={preview.size[0]}x{preview.size[1]}\n',
              encoding='utf-8'
          )
          PY
          tesseract students/timofey/table.png .tmp/timofey-inspection/ocr-original-psm6 -l rus+eng --psm 6 2>/dev/null || true
          tesseract /tmp/table-processed.png .tmp/timofey-inspection/ocr-processed-psm6 -l rus+eng --psm 6 2>/dev/null || true
          tesseract /tmp/table-processed.png .tmp/timofey-inspection/ocr-processed-psm11 -l rus+eng --psm 11 2>/dev/null || true
      - name: Commit inspection output
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A .tmp/timofey-inspection
          git commit -m "[inspection-output] Recognize Timofey board image"
          git push
