name: Fix Timofey lesson interactivity on main

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/nikol-210726-interactivity-v2
          fetch-depth: 0

      - name: Patch initialization order
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('students/timofey/site/lessons/21-07-26.html')
          text = path.read_text(encoding='utf-8')
          old = """    const setTheme = (theme) => {
                body.dataset.theme = theme;
                localStorage.setItem(themeKey, theme);
                drawAll();
              };
              setTheme(localStorage.getItem(themeKey) || 'dark');
              document.getElementById('themeBtn').addEventListener('click', () => {
                setTheme(body.dataset.theme === 'dark' ? 'light' : 'dark');
              });"""
          new = """    const setTheme = (theme) => {
                body.dataset.theme = theme;
                localStorage.setItem(themeKey, theme);
              };
              setTheme(localStorage.getItem(themeKey) || 'dark');
              document.getElementById('themeBtn').addEventListener('click', () => {
                setTheme(body.dataset.theme === 'dark' ? 'light' : 'dark');
                drawAll();
              });"""
          if old in text:
              path.write_text(text.replace(old, new), encoding='utf-8')
          elif new not in text:
              raise SystemExit('Neither old nor corrected Timofey initialization block was found')
          PY

      - name: Validate both interactive scripts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          files = [
              Path('students/timofey/site/lessons/21-07-26.html'),
              Path('students/nikol_sarkisyants/site/21-07-26.html'),
          ]
          for index, path in enumerate(files):
              text = path.read_text(encoding='utf-8')
              scripts = re.findall(r'<script>(.*?)</script>', text, flags=re.S)
              assert scripts, path
              Path(f'/tmp/lesson-{index}.js').write_text(scripts[-1], encoding='utf-8')

          tim = files[0].read_text(encoding='utf-8')
          tim_block = tim.split('const setTheme = (theme) => {', 1)[1].split('};', 1)[0]
          assert 'drawAll()' not in tim_block

          nik = files[1].read_text(encoding='utf-8')
          nik_block = nik.split('function setTheme(t){', 1)[1].split('}', 1)[0]
          assert 'drawAll()' not in nik_block
          PY
          node --check /tmp/lesson-0.js
          node --check /tmp/lesson-1.js

      - name: Update Timofey HTML through Contents API
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          path='students/timofey/site/lessons/21-07-26.html'
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=fix/nikol-210726-interactivity-v2" --jq '.sha')"
          content="$(base64 -w0 "${path}")"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" \
            -f message='[timofey-interactive-fix] Restore Timofey controls and canvas' \
            -f branch='fix/nikol-210726-interactivity-v2' \
            -f sha="${current_sha}" \
            -f content="${content}" \
            --silent
