name: Fix Timofey lesson interactivity on main

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/nikol-210726-interactivity-v2
          fetch-depth: 0
      - name: Patch initialization order
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('students/timofey/site/lessons/21-07-26.html')
          text=path.read_text(encoding='utf-8')
          old="""    const setTheme = (theme) => {
                body.dataset.theme = theme;
                localStorage.setItem(themeKey, theme);
                drawAll();
              };
              setTheme(localStorage.getItem(themeKey) || 'dark');
              document.getElementById('themeBtn').addEventListener('click', () => {
                setTheme(body.dataset.theme === 'dark' ? 'light' : 'dark');
              });"""
          new="""    const setTheme = (theme) => {
                body.dataset.theme = theme;
                localStorage.setItem(themeKey, theme);
              };
              setTheme(localStorage.getItem(themeKey) || 'dark');
              document.getElementById('themeBtn').addEventListener('click', () => {
                setTheme(body.dataset.theme === 'dark' ? 'light' : 'dark');
                drawAll();
              });"""
          if old in text:
              path.write_text(text.replace(old,new),encoding='utf-8')
          elif new not in text:
              raise SystemExit('Neither old nor corrected Timofey initialization block was found')
          PY
      - name: Validate scripts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          files=[
              Path('students/timofey/site/lessons/21-07-26.html'),
              Path('students/nikol_sarkisyants/site/21-07-26.html'),
          ]
          for index,path in enumerate(files):
              text=path.read_text(encoding='utf-8')
              scripts=re.findall(r'<script>(.*?)</script>',text,flags=re.S)
              assert scripts, path
              Path(f'/tmp/lesson-{index}.js').write_text(scripts[-1],encoding='utf-8')
          tim=files[0].read_text(encoding='utf-8')
          block=tim.split('const setTheme = (theme) => {',1)[1].split('};',1)[0]
          assert 'drawAll()' not in block
          nik=files[1].read_text(encoding='utf-8')
          block=nik.split('function setTheme(t){',1)[1].split('}',1)[0]
          assert 'drawAll()' not in block
          PY
          node --check /tmp/lesson-0.js
          node --check /tmp/lesson-1.js
      - name: Commit HTML fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add students/timofey/site/lessons/21-07-26.html
          if git diff --cached --quiet; then
            echo "Timofey HTML is already corrected"
          else
            git commit -m "[timofey-interactive-fix] Restore Timofey controls and canvas"
            git push
          fi
